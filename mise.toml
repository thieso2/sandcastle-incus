[tools]
go = "1.25.6"

[tasks.build]
description = "Build the sandcastle CLI and sc alias"
run = "make build"

[tasks.install]
description = "Install the user CLI and sc alias into ~/.local/bin when it is on PATH, otherwise /usr/local/bin"
run = """
set -euo pipefail

user_bin="${HOME}/.local/bin"
system_bin="/usr/local/bin"

case ":${PATH}:" in
  *":${user_bin}:"*) bindir="${user_bin}" ;;
  *) bindir="${system_bin}" ;;
esac

mkdir_cmd="mkdir -p"
install_cmd="install"
ln_cmd="ln"
if [ "${bindir}" = "${system_bin}" ] && { [ ! -d "${bindir}" ] || [ ! -w "${bindir}" ]; }; then
  mkdir_cmd="sudo mkdir -p"
  install_cmd="sudo install"
  ln_cmd="sudo ln"
fi

echo "Installing sandcastle user CLI to ${bindir}"
mkdir -p bin
go build -o bin/sandcastle ./cmd/sandcastle
${mkdir_cmd} "${bindir}"
${install_cmd} -m 0755 bin/sandcastle "${bindir}/sandcastle"
${ln_cmd} -sf sandcastle "${bindir}/sc"
echo "Installed ${bindir}/sandcastle and ${bindir}/sc"
"""

[tasks."build:linux-amd64"]
description = "Cross-compile the fat sandcastle binary for Linux amd64"
env = { GOOS = "linux", GOARCH = "amd64", CGO_ENABLED = "0", BIN_DIR = "bin/linux-amd64" }
run = "make build"

[tasks."image:deps"]
description = "Check local tools required for image upload"
run = "for tool in docker incus tar zstd; do command -v \"$tool\" >/dev/null || { echo \"$tool is required for image upload\" >&2; exit 127; }; done"

[tasks."image:base:build"]
description = "Build the Sandcastle base OCI image"
env = { SANDCASTLE_REMOTE = "big", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = [
  "make build",
  "./bin/sandcastle-admin image build base --tag ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest}",
]

[tasks."image:base:upload"]
description = "Upload the Sandcastle base OCI image into Incus"
env = { SANDCASTLE_REMOTE = "big", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = [
  "mise run image:deps",
  "make build",
  "bash scripts/import-docker-image-to-incus.sh ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest} ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest} \"$SANDCASTLE_REMOTE\"",
]

[tasks."image:base:import"]
description = "Import the locally built Sandcastle base OCI image into Incus"
env = { SANDCASTLE_REMOTE = "big" }
run = [
  "mise run image:deps",
  "make build",
  "bash scripts/import-docker-image-to-incus.sh ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest} ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest} \"$SANDCASTLE_REMOTE\"",
]

[tasks."image:base:build-upload"]
description = "Build and upload the Sandcastle base OCI image"
env = { SANDCASTLE_REMOTE = "big", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = [
  "mise run image:deps",
  "make build",
  "./bin/sandcastle-admin image build base --tag ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest}",
  "bash scripts/import-docker-image-to-incus.sh ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest} ${SANDCASTLE_BASE_IMAGE:-sandcastle/base:latest} \"$SANDCASTLE_REMOTE\"",
]

[tasks."image:tenant:sync"]
description = "Sync published Sandcastle image aliases into image-enabled tenant projects"
env = { SANDCASTLE_REMOTE = "big" }
run = "bash scripts/sync-sandcastle-images-to-projects.sh \"$SANDCASTLE_REMOTE\""

[tasks."image:all:build-upload"]
description = "Rebuild and upload all Sandcastle OCI images into Incus"
env = { SANDCASTLE_REMOTE = "big", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = [
  "mise run image:base:build-upload",
  "mise run image:ai:build-upload",
  "mise run image:tenant:sync",
]

[tasks."infra:redeploy"]
description = "Cross-compile sandcastle-admin and push updated binary to route-broker and auth-app containers, then restart their services"
env = { SANDCASTLE_REMOTE = "big", SANDCASTLE_INFRA_PROJECT = "sc-infra" }
run = """
set -euo pipefail
REMOTE="${SANDCASTLE_REMOTE}"
PROJECT="${SANDCASTLE_INFRA_PROJECT}"
mise run build:linux-amd64
deploy() {
  local instance="$1" service="$2"
  echo "Deploying to ${instance}..."
  incus file push --project "$PROJECT" bin/linux-amd64/sandcastle-admin "${REMOTE}:${instance}/usr/local/bin/sandcastle-admin.new"
  incus exec --project "$PROJECT" "${REMOTE}:${instance}" -- mv -f /usr/local/bin/sandcastle-admin.new /usr/local/bin/sandcastle-admin
  incus exec --project "$PROJECT" "${REMOTE}:${instance}" -- systemctl restart "${service}"
}
deploy sc-route-broker sandcastle-route-broker
deploy sc-auth-app sandcastle-auth-app
echo "Done."
"""

[tasks."image:ai:build-upload"]
description = "Resolve latest AI tool versions, build the Sandcastle AI OCI image, and upload it into Incus"
env = { SANDCASTLE_REMOTE = "big", DOCKER_DEFAULT_PLATFORM = "linux/amd64" }
run = """
set -euo pipefail

npm_latest() { curl -sf "https://registry.npmjs.org/$1/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])"; }

CODEX_VERSION="${SANDCASTLE_CODEX_VERSION:-$(npm_latest @openai/codex)}"
CLAUDE_VERSION="${SANDCASTLE_CLAUDE_VERSION:-$(npm_latest @anthropic-ai/claude-code)}"
GEMINI_VERSION="${SANDCASTLE_GEMINI_VERSION:-$(npm_latest @google/gemini-cli)}"
AI_TAG="${SANDCASTLE_AI_IMAGE:-sandcastle/ai:latest}"

echo "codex   ${CODEX_VERSION}"
echo "claude  ${CLAUDE_VERSION}"
echo "gemini  ${GEMINI_VERSION}"
echo "tag     ${AI_TAG}"

mise run image:deps
make build

./bin/sandcastle-admin image build ai \
  --tag "${AI_TAG}" \
  --codex-version  "${CODEX_VERSION}" \
  --claude-version "${CLAUDE_VERSION}" \
  --gemini-version "${GEMINI_VERSION}"

bash scripts/import-docker-image-to-incus.sh "${AI_TAG}" "${AI_TAG}" "$SANDCASTLE_REMOTE"
"""

[tasks."image:base:build-remote"]
description = "Build the base image in the sc-build Image Builder appliance and publish to GHCR (needs SANDCASTLE_GHCR_TOKEN)"
env = { SANDCASTLE_REMOTE = "big" }
run = [
  "make build",
  "./bin/sandcastle-admin image build-remote base",
]

[tasks."image:ai:build-remote"]
description = "Resolve AI tool versions, build the AI image in the sc-build appliance, and publish to GHCR (needs SANDCASTLE_GHCR_TOKEN)"
env = { SANDCASTLE_REMOTE = "big" }
run = """
set -euo pipefail

npm_latest() { curl -sf "https://registry.npmjs.org/$1/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])"; }

CODEX_VERSION="${SANDCASTLE_CODEX_VERSION:-$(npm_latest @openai/codex)}"
CLAUDE_VERSION="${SANDCASTLE_CLAUDE_VERSION:-$(npm_latest @anthropic-ai/claude-code)}"
GEMINI_VERSION="${SANDCASTLE_GEMINI_VERSION:-$(npm_latest @google/gemini-cli)}"

make build

./bin/sandcastle-admin image build-remote ai \
  --codex-version  "${CODEX_VERSION}" \
  --claude-version "${CLAUDE_VERSION}" \
  --gemini-version "${GEMINI_VERSION}"
"""

[tasks."image:builder:provision"]
description = "Create and provision the sc-build Image Builder appliance so build-remote runs skip provisioning"
env = { SANDCASTLE_REMOTE = "big", VERBOSE = "1" }
run = [
  "make build",
  "./bin/sandcastle-admin image builder provision",
]

[tasks."image:all:build-remote"]
description = "Build base then AI in the sc-build appliance and publish both to GHCR (needs SANDCASTLE_GHCR_TOKEN)"
env = { SANDCASTLE_REMOTE = "big", VERBOSE = "1" }
run = """
set -euo pipefail

npm_latest() { curl -sf "https://registry.npmjs.org/$1/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])"; }

CODEX_VERSION="${SANDCASTLE_CODEX_VERSION:-$(npm_latest @openai/codex)}"
CLAUDE_VERSION="${SANDCASTLE_CLAUDE_VERSION:-$(npm_latest @anthropic-ai/claude-code)}"
GEMINI_VERSION="${SANDCASTLE_GEMINI_VERSION:-$(npm_latest @google/gemini-cli)}"

make build

./bin/sandcastle-admin image build-remote all \
  --codex-version  "${CODEX_VERSION}" \
  --claude-version "${CLAUDE_VERSION}" \
  --gemini-version "${GEMINI_VERSION}"
"""
