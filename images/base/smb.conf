# Sandcastle Samba configuration.
#
# smbd autostarts on every machine but exposes nothing until a Samba account is
# created with `sandcastle password set`, which runs `smbpasswd -a` for the
# tenant's Linux user.
#
# The exported shares are the connecting user's home directory and /workspace,
# but their share NAMES are <project>-<machine>-home and
# <project>-<machine>-workspace so a user who mounts several machines (even
# same-named machines in different projects) gets distinct names instead of a
# pile of colliding "home"/"workspace" shares. Samba cannot substitute variables
# in section names, so the share sections are generated at machine-configure
# time into the included file below (see images/base/sandcastle-bootstrap).
#
# Authentication is plain user-level security; there is no guest access.

[global]
   workgroup = WORKGROUP
   server string = Sandcastle %h
   security = user
   map to guest = never
   server min protocol = SMB2
   server smb encrypt = desired
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes
   # nmbd is disabled; skip NetBIOS so smbd does not wait on it.
   disable netbios = yes
   smb ports = 445
   # Keep logs quiet and local.
   log level = 0
   max log size = 50
   # Per-machine, hostname-prefixed shares rendered by sandcastle-bootstrap.
   include = /etc/samba/sandcastle-shares.conf
