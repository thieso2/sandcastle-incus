# Sandcastle Samba configuration.
#
# smbd autostarts on every machine but exposes nothing until a Samba account is
# created with `sandcastle password set`, which runs `smbpasswd -a` for the
# tenant's Linux user. Two explicit shares are exported:
#
#   [home]      -> the connecting user's home directory (%H, e.g. /home/<user>)
#   [workspace] -> /workspace
#
# Authentication is plain user-level security; there is no guest access.

[global]
   workgroup = WORKGROUP
   server string = Sandcastle %h
   security = user
   map to guest = never
   server min protocol = SMB2
   server smb encrypt = desired
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes
   # nmbd is disabled; skip NetBIOS so smbd does not wait on it.
   disable netbios = yes
   smb ports = 445
   # Keep logs quiet and local.
   log level = 0
   max log size = 50

[home]
   comment = Sandcastle home
   path = %H
   browseable = yes
   read only = no
   create mask = 0644
   directory mask = 0755

[workspace]
   comment = Sandcastle workspace
   path = /workspace
   browseable = yes
   read only = no
   create mask = 0644
   directory mask = 0755
