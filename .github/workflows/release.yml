name: Release

# Cutting a `v*` tag builds the cross-platform CLI, attaches the archives +
# checksums to a GitHub release, signs/notarizes the macOS binaries, and pushes
# the Homebrew Cask to thieso2/homebrew-tap — all driven by .goreleaser.yaml.
#
# A manual `workflow_dispatch` (or any non-tag ref) instead does a snapshot
# build and uploads the artifacts, so the pipeline can be exercised without
# publishing anything.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # GoReleaser creates the GitHub release and uploads assets

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # GoReleaser needs full history + tags to derive the version and
          # changelog; a shallow clone breaks both.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Tag push → full release: publish the GitHub release and push the Cask.
      # macOS signing/notarization runs here on Linux via GoReleaser's built-in
      # signer and self-skips when the MACOS_* secrets are absent (see the
      # `isEnvSet` gate in .goreleaser.yaml).
      - name: Run GoReleaser (release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The cross-repo tap push needs a PAT; the default GITHUB_TOKEN cannot
          # write to thieso2/homebrew-tap. Secret HOMEBREW_TAP_TOKEN (#99) maps
          # to the env var .goreleaser.yaml reads.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      # Non-tag ref (manual dispatch) → snapshot only, nothing is published.
      - name: Run GoReleaser (snapshot)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: sandcastle-cli-snapshot
          path: |
            dist/sandcastle-*.tar.gz
            dist/checksums.txt
          retention-days: 7
