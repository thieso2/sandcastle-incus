name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  safe-e2e:
    name: Safe Go and e2e tiers
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # `sc login` shells out to `incus remote add`, so the login tests in
      # internal/cli need an `incus` binary on PATH or they fail with
      # "the incus client is required". incus-client is the client-only package.
      - name: Install the Incus client
        run: sudo apt-get update && sudo apt-get install -y incus-client


      - name: v1 shapes stay impossible
        run: |
          set -euo pipefail
          # v1 is removed (#52). These symbols minted the v1 name shapes that
          # leaked into v2 paths and caused #51, #55 and the share-reconcile bug.
          # If one reappears, the shape is constructable again.
          if grep -rn --include='*.go' \
              -e 'MachineIncusInstanceName' \
              -e 'meta.KindTenant' \
              -e 'TenantInfraIncusProjectName' \
              -e 'TenantNativeIncusProjectName' \
              internal/ cmd/; then
            echo "::error::v1 name shape reintroduced (see #52)"
            exit 1
          fi
          echo "no v1 name shapes"

      - name: Unit tests
        run: scripts/e2e.sh unit

      - name: Gated e2e compile and skip checks
        run: scripts/e2e.sh gated

